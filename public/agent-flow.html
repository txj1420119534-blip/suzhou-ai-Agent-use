<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>一镜入姑苏 Agent 前端预览</title>
    <style>
      :root {
        --ink: #241d18;
        --muted: #766a5f;
        --paper: #fbf4e7;
        --red: #c42f2f;
        --gold: #d8b36a;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
        color: white;
        background: #050505;
      }

      .phone {
        position: relative;
        width: min(420px, 100vw);
        aspect-ratio: 9 / 16;
        overflow: hidden;
        border-radius: 34px;
        background: #111;
        box-shadow: 0 0 0 1px rgba(255,255,255,.1), 0 32px 90px rgba(0,0,0,.5);
      }

      .view {
        position: absolute;
        inset: 0;
        display: none;
        overflow: hidden;
      }

      .view.is-active { display: block; }

      .feed video,
      .camera video {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        background: #222;
      }

      .feed::after,
      .camera::after,
      .scene::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(to bottom, rgba(0,0,0,.25), transparent 32%, rgba(0,0,0,.74));
        pointer-events: none;
      }

      .top {
        position: absolute;
        z-index: 4;
        left: 20px;
        right: 20px;
        top: 18px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-weight: 800;
      }

      .tabs {
        display: flex;
        gap: 22px;
        font-size: 18px;
      }

      .tabs button,
      .ghost-btn,
      .back,
      .mascot,
      .choice button,
      .primary,
      .pill {
        border: 0;
        font: inherit;
        cursor: pointer;
      }

      .tabs button {
        padding: 0;
        color: rgba(255,255,255,.72);
        background: transparent;
        font-weight: 800;
      }

      .tabs button.is-active { color: white; }

      .feed-copy {
        position: absolute;
        z-index: 4;
        left: 20px;
        right: 92px;
        bottom: 72px;
        text-shadow: 0 2px 8px rgba(0,0,0,.45);
      }

      .feed-copy strong {
        display: block;
        margin-bottom: 8px;
        font-size: 18px;
      }

      .feed-copy p {
        margin: 0 0 10px;
        line-height: 1.55;
      }

      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        font-size: 13px;
        font-weight: 800;
      }

      .right-actions {
        position: absolute;
        z-index: 6;
        right: 18px;
        bottom: 108px;
        display: grid;
        gap: 18px;
        text-align: center;
        font-weight: 800;
      }

      .mascot {
        position: absolute;
        z-index: 8;
        right: 18px;
        top: 150px;
        width: 68px;
        height: 68px;
        padding: 0;
        background: url("assets/images/agent_mirror.gif") center / contain no-repeat;
        filter: drop-shadow(0 8px 18px rgba(0,0,0,.38));
      }

      .mascot-tip {
        position: absolute;
        z-index: 7;
        right: 82px;
        top: 168px;
        max-width: 210px;
        padding: 10px 13px;
        border-radius: 999px;
        color: #3d3025;
        background: rgba(255,250,235,.9);
        font-size: 13px;
        font-weight: 800;
      }

      .status {
        position: absolute;
        z-index: 20;
        inset: 0;
        display: none;
        place-items: center;
        padding: 28px;
        text-align: center;
        background: rgba(19, 14, 9, .5);
        backdrop-filter: blur(8px);
      }

      .status.is-active { display: grid; }

      .status-card {
        width: 100%;
        padding: 26px;
        border: 1px solid rgba(232, 205, 153, .42);
        border-radius: 20px;
        background: rgba(251,244,231,.92);
        color: var(--ink);
      }

      .spinner {
        width: 42px;
        height: 42px;
        margin: 0 auto 14px;
        border: 3px solid rgba(118, 93, 54, .18);
        border-top-color: var(--red);
        border-radius: 50%;
        animation: spin 900ms linear infinite;
      }

      @keyframes spin { to { transform: rotate(360deg); } }

      .camera-frame {
        position: absolute;
        z-index: 5;
        inset: 74px 22px 138px;
        border: 2px solid rgba(255,255,255,.72);
        border-radius: 24px;
        box-shadow: 0 0 0 999px rgba(0,0,0,.28);
        pointer-events: none;
      }

      .camera-controls {
        position: absolute;
        z-index: 8;
        left: 0;
        right: 0;
        bottom: 26px;
        display: grid;
        justify-items: center;
        gap: 12px;
      }

      .shutter {
        width: 74px;
        height: 74px;
        border-radius: 50%;
        border: 5px solid white;
        background: var(--red);
        box-shadow: 0 0 0 1px rgba(0,0,0,.3);
      }

      .file-pick {
        color: rgba(255,255,255,.8);
        font-size: 13px;
      }

      .file-pick input { width: 190px; }

      .back {
        position: absolute;
        z-index: 9;
        top: 24px;
        left: 18px;
        width: 42px;
        height: 42px;
        border-radius: 50%;
        color: white;
        background: rgba(0,0,0,.34);
        font-size: 28px;
      }

      .scene {
        background: linear-gradient(180deg, #f7ead2, #e4d0ad);
        color: var(--ink);
      }

      .scene-bg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: .9;
      }

      .scene-content {
        position: absolute;
        z-index: 3;
        left: 24px;
        right: 24px;
        bottom: 42px;
        padding: 20px;
        border-radius: 22px;
        color: var(--ink);
        background: rgba(255, 250, 239, .86);
        box-shadow: 0 18px 50px rgba(54, 34, 16, .18);
      }

      .scene-content h1 {
        margin: 0 0 10px;
        font-size: 28px;
      }

      .scene-content p {
        margin: 0 0 14px;
        line-height: 1.65;
        color: #5f5145;
      }

      .scene-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .pill,
      .primary {
        border-radius: 999px;
        padding: 12px 14px;
        color: white;
        background: var(--red);
        font-weight: 800;
      }

      .pill {
        color: #4c3724;
        background: rgba(255, 245, 219, .9);
        border: 1px solid rgba(126, 92, 45, .2);
      }

      .choice {
        display: grid;
        gap: 10px;
        margin-top: 16px;
      }

      .choice button {
        display: grid;
        gap: 4px;
        padding: 12px 14px;
        border-radius: 14px;
        text-align: left;
        color: var(--ink);
        background: rgba(255,255,255,.78);
      }

      .choice span {
        color: var(--muted);
        font-size: 12px;
      }

      .switcher {
        position: absolute;
        z-index: 10;
        left: 20px;
        right: 20px;
        top: 64px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }

      .ghost-btn {
        padding: 8px 10px;
        border-radius: 999px;
        color: white;
        background: rgba(0,0,0,.32);
        font-size: 12px;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main class="phone">
      <section id="feed" class="view feed is-active">
        <video id="feedVideo" src="assets/videos/hanshansi.mp4" muted loop autoplay playsinline></video>
        <div class="top">
          <span>20:31</span>
          <div class="tabs">
            <button>直播</button>
            <button>同城</button>
            <button class="is-active">推荐</button>
            <button>关注</button>
          </div>
        </div>
        <div class="switcher">
          <button class="ghost-btn" data-feed-mode="none">普通视频</button>
          <button class="ghost-btn" data-feed-mode="hanshansi">寒山寺视频</button>
          <button class="ghost-btn" data-feed-mode="pingjianglu">平江路视频</button>
        </div>
        <button id="mascot" class="mascot" aria-label="打开一镜入姑苏 Agent"></button>
        <div class="mascot-tip">点我，识别当前画面</div>
        <div class="right-actions">
          <div>♥<br>2.4w</div>
          <div>☰<br>892</div>
          <div>★<br>1.1w</div>
          <div>↗<br>分享</div>
        </div>
        <div class="feed-copy">
          <strong id="author">@枫桥夜泊不睡觉</strong>
          <p id="caption">刷到寒山寺，AI 小镜会直接识别当前视频里的苏州地标。</p>
          <div id="tags" class="tags">#一镜入姑苏 #寒山寺 #视觉搜索</div>
        </div>
      </section>

      <section id="camera" class="view camera">
        <video id="cameraVideo" autoplay muted playsinline></video>
        <button class="back" data-back>‹</button>
        <div class="top"><span>视觉搜索</span><span id="cameraState">等待拍摄</span></div>
        <div class="camera-frame"></div>
        <div class="camera-controls">
          <label class="file-pick">也可上传照片 <input id="cameraFile" type="file" accept="image/*" /></label>
          <button id="shutter" class="shutter" aria-label="拍摄并识别"></button>
        </div>
      </section>

      <section id="scene" class="view scene">
        <button class="back" data-back>‹</button>
        <img id="sceneBg" class="scene-bg" alt="">
        <div class="scene-content">
          <h1 id="sceneTitle">识别结果</h1>
          <p id="sceneBody">正在生成地标介绍。</p>
          <div id="sceneActions" class="scene-actions"></div>
        </div>
      </section>

      <div id="status" class="status">
        <div class="status-card">
          <div class="spinner"></div>
          <strong id="statusTitle">正在识别</strong>
          <p id="statusText">AI 正在读取画面里的牌匾、建筑和地标线索。</p>
          <div id="choices" class="choice"></div>
        </div>
      </div>
    </main>

    <script>
      const state = {
        feedMode: "hanshansi",
        stream: null,
        scenes: {}
      };

      const $ = (id) => document.getElementById(id);
      const views = ["feed", "camera", "scene"].map($);

      const sceneAssets = {
        pingjianglu: "assets/images/pingjiang_theme_bg.png",
        hanshansi: "assets/images/hanshan_theme_bg.png",
        default: "assets/images/welcome_suzhou.png"
      };

      function showView(id) {
        views.forEach((view) => view.classList.toggle("is-active", view.id === id));
      }

      function showStatus(title, text) {
        $("statusTitle").textContent = title;
        $("statusText").textContent = text;
        $("choices").innerHTML = "";
        $("status").classList.add("is-active");
      }

      function hideStatus() {
        $("status").classList.remove("is-active");
      }

      async function postJson(url, body) {
        const response = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });
        return response.json();
      }

      async function loadScenes() {
        const data = await fetch("/api/scenes").then((res) => res.json());
        state.scenes = Object.fromEntries((data.scenes || []).map((scene) => [scene.id, scene]));
      }

      function setFeedMode(mode) {
        state.feedMode = mode;
        const video = $("feedVideo");
        const author = $("author");
        const caption = $("caption");
        const tags = $("tags");

        if (mode === "hanshansi") {
          video.src = "assets/videos/hanshansi.mp4";
          author.textContent = "@枫桥夜泊不睡觉";
          caption.textContent = "刷到寒山寺，AI 小镜会直接识别当前视频里的苏州地标。";
          tags.textContent = "#一镜入姑苏 #寒山寺 #视觉搜索";
        } else if (mode === "pingjianglu") {
          video.src = "assets/videos/pingjiang_boat.mp4";
          author.textContent = "@今天也在河边发呆";
          caption.textContent = "下高铁就上船，水巷、石桥和白墙黛瓦都在镜头里。";
          tags.textContent = "#一镜入姑苏 #平江路 #苏州文旅";
        } else {
          video.src = "assets/videos/pingjiang_boat.mp4";
          author.textContent = "@随手拍日常";
          caption.textContent = "这条视频暂时没有明确地标，点击小镜会唤起相机继续识别。";
          tags.textContent = "#日常 #随手拍 #今天吃什么";
        }
        video.play().catch(() => {});
      }

      function feedHint() {
        if (state.feedMode === "hanshansi") return "当前视频字幕和画面出现寒山寺、枫桥、钟声";
        if (state.feedMode === "pingjianglu") return "当前视频画面出现平江路、水巷、石桥、白墙黛瓦";
        return "";
      }

      async function handleMascot() {
        const hint = feedHint();
        if (!hint) {
          await openCamera();
          return;
        }

        showStatus("正在识别当前视频", "优先读取字幕、牌匾和著名地标线索。");
        const result = await postJson("/api/recognize/video", { userText: hint });
        await handleRecognitionResult(result);
      }

      async function openCamera() {
        showView("camera");
        $("cameraState").textContent = "等待拍摄";
        try {
          state.stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment" },
            audio: false
          });
          $("cameraVideo").srcObject = state.stream;
        } catch {
          $("cameraState").textContent = "可上传照片识别";
        }
      }

      function stopCamera() {
        if (state.stream) {
          state.stream.getTracks().forEach((track) => track.stop());
          state.stream = null;
        }
        $("cameraVideo").srcObject = null;
      }

      function captureFrame() {
        const video = $("cameraVideo");
        if (!video.videoWidth || !video.videoHeight) return "";
        const canvas = document.createElement("canvas");
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext("2d").drawImage(video, 0, 0);
        return canvas.toDataURL("image/jpeg", 0.86);
      }

      async function fileToDataUrl(file) {
        if (!file) return "";
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      }

      async function recognizeCamera() {
        $("cameraState").textContent = "识别中";
        showStatus("正在识别拍摄画面", "AI 正在判断是否为苏州核心地标。");
        const file = $("cameraFile").files && $("cameraFile").files[0];
        const imageDataUrl = file ? await fileToDataUrl(file) : captureFrame();
        const result = await postJson("/api/recognize/camera", { imageDataUrl });
        await handleRecognitionResult(result);
      }

      async function handleRecognitionResult(result) {
        const recognition = result.recognition || {};
        const route = result.route || {};

        if (route.nextAction === "choose_landmark") {
          showChoices(route.candidates || recognition.candidates || []);
          return;
        }

        if (route.nextAction === "open_demo_scene" || route.nextAction === "show_landmark_card") {
          await openScene(route.scene || {}, route.card, recognition);
          return;
        }

        showStatus("未识别到苏州地标", "可以把镜头靠近牌匾、路牌、寺塔、园林或水巷细节后再拍一次。");
        setTimeout(() => hideStatus(), 1600);
      }

      function showChoices(candidates) {
        showStatus("识别到多个地标", "请选择你想进入的地标生态页。");
        $("choices").innerHTML = candidates.map((item) => `
          <button type="button" data-scene-id="${item.sceneId}" data-name="${item.landmarkName}">
            <strong>${item.landmarkName}</strong>
            <span>${Math.round((item.confidence || 0) * 100)}% · ${item.reason || "苏州地标候选"}</span>
          </button>
        `).join("");
      }

      async function chooseScene(sceneId, name) {
        showStatus("正在进入生态页", `即将打开 ${name}`);
        const result = await postJson("/api/route-scene", { sceneId, landmarkName: name });
        await openScene(result.route.scene || {}, result.route.card, { landmarkName: name, sceneId });
      }

      async function openScene(scene, card, recognition) {
        stopCamera();
        hideStatus();
        const sceneId = recognition.sceneId || scene.id || "default";
        const title = scene.name || card?.title || recognition.landmarkName || "苏州地标";
        $("sceneTitle").textContent = title;
        $("sceneBody").textContent = card?.body || scene.summary || `${title}已被识别为苏州地标。AI 可以继续介绍历史、文化背景和附近推荐。`;
        $("sceneBg").src = sceneAssets[sceneId] || sceneAssets.default;

        if (sceneId === "pingjianglu") {
          $("sceneActions").innerHTML = `
            <button class="primary" onclick="location.href='/?scene=pingjianglu'">进入平江路完整 Demo</button>
            <button class="pill">了解平江路</button>
          `;
        } else if (sceneId === "hanshansi") {
          $("sceneActions").innerHTML = `
            <button class="primary" onclick="location.href='/?scene=hanshansi'">进入寒山寺完整 Demo</button>
            <button class="pill">和苏轼对话</button>
          `;
        } else {
          $("sceneActions").innerHTML = `
            <button class="primary">生成打卡卡片</button>
            <button class="pill">附近推荐</button>
          `;
        }

        showView("scene");
      }

      document.querySelectorAll("[data-feed-mode]").forEach((button) => {
        button.addEventListener("click", () => setFeedMode(button.dataset.feedMode));
      });

      document.querySelectorAll("[data-back]").forEach((button) => {
        button.addEventListener("click", () => {
          stopCamera();
          hideStatus();
          showView("feed");
          $("feedVideo").play().catch(() => {});
        });
      });

      $("mascot").addEventListener("click", handleMascot);
      $("shutter").addEventListener("click", recognizeCamera);
      $("cameraFile").addEventListener("change", recognizeCamera);
      $("choices").addEventListener("click", (event) => {
        const button = event.target.closest("button[data-scene-id]");
        if (button) chooseScene(button.dataset.sceneId, button.dataset.name);
      });

      loadScenes();
      setFeedMode("hanshansi");
    </script>
  </body>
</html>
